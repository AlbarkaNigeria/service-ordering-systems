<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALBARKA CBT Training</title>
    <style>
        :root { --primary-green: #2e7d32; --header-bg: #f5f5f5; --border-color: #ddd; }
        body { font-family: Arial, sans-serif; background-color: #e8f5e9; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 950px; background: white; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; }
        
        /* Login Screen */
        #login-screen { padding: 50px; text-align: center; }
        .login-box { max-width: 300px; margin: 0 auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px; background: #fafafa; }
        .login-box h2 { color: var(--primary-green); margin-top: 0; }
        .login-box input { width: 90%; padding: 12px; margin: 15px 0; border: 1px solid #ccc; border-radius: 4px; font-size: 18px; text-align: center; letter-spacing: 4px; }
        
        /* Header */
        .header { background-color: var(--header-bg); padding: 15px 25px; border-bottom: 2px solid var(--primary-green); display: none; justify-content: space-between; align-items: center; }
        .header h1 { color: var(--primary-green); margin: 0; font-size: 22px; text-transform: uppercase; }
        .timer { color: #d32f2f; font-size: 24px; font-weight: bold; }
        
        /* Sections */
        .setup-section { padding: 20px; background: #fff; border-bottom: 1px solid #eee; display: none; }
        .subject-selectors { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 10px; }
        select, button.btn-main { padding: 10px; border-radius: 4px; border: 1px solid var(--border-color); font-size: 14px; }
        .btn-main { background: var(--primary-green); color: white; cursor: pointer; border: none; font-weight: bold; transition: 0.3s; }
        .btn-main:hover { opacity: 0.9; }
        
        /* Exam Body */
        .exam-body { padding: 30px; min-height: 300px; display: none; }
        .question-text { font-size: 18px; font-weight: bold; margin-bottom: 20px; min-height: 60px; }
        .options-container { display: flex; flex-direction: column; gap: 10px; }
        .option { padding: 12px; border: 1px solid var(--border-color); border-radius: 5px; cursor: pointer; transition: background 0.2s; }
        .option:hover { background-color: #f1f8e9; }
        .option.selected { background-color: var(--primary-green); color: white; border-color: var(--primary-green); }
        
        /* Nav & Grid */
        .navigation { padding: 20px; display: none; justify-content: space-between; border-top: 1px solid #eee; }
        .nav-btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-right: 5px; }
        .btn-prev { background: #ccc; }
        .btn-next { background: var(--primary-green); color: white; }
        .btn-skip { background: #fbc02d; color: black; }
        .btn-submit { background: #d32f2f; color: white; }
        .q-grid { padding: 15px; display: none; flex-wrap: wrap; gap: 5px; background: #fafafa; border-top: 1px solid #eee; }
        .q-circle { width: 30px; height: 30px; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; font-size: 11px; cursor: pointer; border-radius: 3px; }
        .q-circle.active { border: 2px solid var(--primary-green); font-weight: bold; color: var(--primary-green); }
        .q-circle.answered { background: var(--primary-green); color: white; border-color: var(--primary-green); }
        
        .footer { background: black; color: white; text-align: center; padding: 15px; font-size: 13px; margin-top: auto; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen">
        <div class="login-box">
            <h2>ALBARKA</h2>
            <p>Enter 8-Digit Access Code</p>
            <input type="password" id="accessCode" maxlength="8" placeholder="********">
            <button class="btn-main" style="width: 100%;" onclick="validateLogin()">LOGIN</button>
            <p id="login-error" style="color:red; font-size:12px; margin-top:10px; display:none;">Invalid Access Code!</p>
        </div>
    </div>

    <div class="header" id="main-header">
        <h1>ALBARKA CBT Training</h1>
        <div class="timer" id="timer">40:00</div>
    </div>

    <div class="setup-section" id="setup">
        <p><strong>Select your 3 additional subjects (English is Compulsory):</strong></p>
        <div class="subject-selectors">
            <select disabled><option>English Language</option></select>
            <select id="sub2">
                <option value="">Select Subject 2</option>
                <option value="Mathematics">Mathematics</option>
                <option value="Biology">Biology</option>
                <option value="Government">Government</option>
            </select>
            <select id="sub3">
                <option value="">Select Subject 3</option>
                <option value="Physics">Physics</option>
                <option value="Economics">Economics</option>
                <option value="Literature">Literature</option>
            </select>
            <select id="sub4">
                <option value="">Select Subject 4</option>
                <option value="Chemistry">Chemistry</option>
                <option value="Commerce">Commerce</option>
                <option value="Agricultural Science">Agricultural Science</option>
            </select>
            <button class="btn-main" onclick="startExam()">START TRAINING</button>
        </div>
    </div>

    <div class="exam-body" id="exam-body">
        <div id="subject-tabs" style="margin-bottom: 15px; color: var(--primary-green); font-weight: bold; border-bottom: 1px solid #ddd; padding-bottom: 5px;">
            CURRENT SUBJECT: <span id="current-subject-name">---</span>
        </div>
        <div class="question-text" id="question-text"></div>
        <div class="options-container" id="options"></div>
    </div>

    <div class="navigation" id="nav-controls">
        <div>
            <button class="nav-btn btn-prev" onclick="changeQuestion(-1)">PREVIOUS</button>
            <button class="nav-btn btn-next" onclick="changeQuestion(1)">NEXT</button>
        </div>
        <div>
            <button class="nav-btn btn-skip" onclick="changeQuestion(1)">SKIP</button>
            <button class="nav-btn btn-submit" onclick="submitExam()">SUBMIT EXAM</button>
        </div>
    </div>

    <div class="q-grid" id="q-grid"></div>

    <div class="footer">
        Copyright Albarka Nigeria Ltd. All right reserved.
    </div>
</div>

<script>
    // Valid Access Codes
    const validCodes = ["12345678", "00000000", "11111111"];
    
    function validateLogin() {
        const inputCode = document.getElementById('accessCode').value;
        const errorMsg = document.getElementById('login-error');
        
        if (validCodes.includes(inputCode)) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-header').style.display = 'flex';
            document.getElementById('setup').style.display = 'block';
        } else {
            errorMsg.style.display = 'block';
        }
    }

    const bank = {
        "English": [
            { q: "Choose the word opposite in meaning to 'Optimistic'?", a: ["Positive", "Pessimistic", "Hopeful", "Cheerful"], c: 1 },
            { q: "A person who writes a book is called?", a: ["Author", "Poet", "Publisher", "Editor"], c: 0 },
            { q: "Identify the noun: 'The quick brown fox jumps over the lazy dog.'", a: ["Quick", "Fox", "Jumps", "Over"], c: 1 },
            { q: "What is the plural of 'Criteria'?", a: ["Criterion", "Criterias", "Criteriae", "Criterions"], c: 0 },
            { q: "Choose the correctly spelled word.", a: ["Accommodation", "Acomodation", "Accomodation", "Acommodation"], c: 0 },
            { q: "The boy ___ to school every day.", a: ["go", "gone", "goes", "going"], c: 2 },
            { q: "Which of these is a conjunction?", a: ["But", "Fast", "Happily", "Under"], c: 0 },
            { q: "What is the synonym of 'Enormous'?", a: ["Tiny", "Huge", "Soft", "Weak"], c: 1 },
            { q: "Find the odd one out.", a: ["Apple", "Orange", "Potato", "Mango"], c: 2 },
            { q: "A collection of lions is called a?", a: ["Pack", "Herd", "Pride", "Swarm"], c: 2 },
            { q: "Which of these is a pronoun?", a: ["John", "Nigeria", "He", "Running"], c: 2 },
            { q: "The past tense of 'Eat' is?", a: ["Eaten", "Eats", "Ate", "Eating"], c: 2 },
            { q: "A sentence must end with a?", a: ["Comma", "Full stop", "Colon", "Dash"], c: 1 },
            { q: "He is as brave as a ___.", a: ["Tiger", "Lion", "Elephant", "Snake"], c: 1 },
            { q: "Which is an adjective?", a: ["Beautiful", "Beauty", "Beautify", "Beautifully"], c: 0 },
            { q: "The opposite of 'Ancient' is?", a: ["Old", "Antique", "Modern", "Classic"], c: 2 },
            { q: "A poem of fourteen lines is a?", a: ["Sonnet", "Epic", "Ballad", "Lyric"], c: 0 },
            { q: "I ___ finished my work.", a: ["has", "have", "am", "is"], c: 1 },
            { q: "Which word is a verb?", a: ["Table", "Sing", "Blue", "Quickly"], c: 1 },
            { q: "The study of sounds in English is?", a: ["Phonetics", "Grammar", "Syntax", "Lexis"], c: 0 }
        ],
        "Mathematics": [
            { q: "Solve for x: 2x + 5 = 15", a: ["5", "10", "15", "20"], c: 0 },
            { q: "What is the square root of 144?", a: ["10", "11", "12", "13"], c: 2 },
            { q: "How many sides has a Decagon?", a: ["8", "9", "10", "12"], c: 2 },
            { q: "Calculate 15% of 200.", a: ["20", "25", "30", "35"], c: 2 },
            { q: "What is the value of Pi (π) to 2 decimal places?", a: ["3.12", "3.14", "3.16", "3.18"], c: 1 },
            { q: "An angle less than 90 degrees is?", a: ["Obtuse", "Reflex", "Right", "Acute"], c: 3 },
            { q: "What is the next number: 2, 4, 8, 16, ...?", a: ["20", "24", "32", "64"], c: 2 },
            { q: "Area of a rectangle with length 10cm and width 5cm is?", a: ["15cm²", "50cm²", "30cm²", "25cm²"], c: 1 },
            { q: "If a=2 and b=3, find a² + b².", a: ["10", "13", "15", "25"], c: 1 },
            { q: "Which is a prime number?", a: ["1", "4", "9", "11"], c: 3 },
            { q: "LCM of 4 and 6 is?", a: ["2", "12", "24", "10"], c: 1 },
            { q: "A triangle with all sides equal is?", a: ["Isosceles", "Scalene", "Equilateral", "Right-angled"], c: 2 },
            { q: "Solve 100 / 0.5", a: ["50", "200", "105", "25"], c: 1 },
            { q: "What is 2 to the power of 5?", a: ["10", "16", "32", "64"], c: 2 },
            { q: "Convert 1/4 to percentage.", a: ["14%", "25%", "40%", "75%"], c: 1 },
            { q: "The sum of angles in a triangle is?", a: ["90°", "180°", "270°", "360°"], c: 1 },
            { q: "What is the mode in {1, 2, 2, 3, 4}?", a: ["1", "2", "3", "4"], c: 1 },
            { q: "Value of log10(100)?", a: ["1", "2", "10", "100"], c: 1 },
            { q: "A circle has a diameter of 14, what is the radius?", a: ["7", "14", "21", "28"], c: 0 },
            { q: "Binary of 5 is?", a: ["100", "101", "110", "111"], c: 1 }
        ],
        "Biology": [
            { q: "The powerhouse of the cell is?", a: ["Nucleus", "Ribosome", "Mitochondria", "Vacuole"], c: 2 },
            { q: "Which organ pumps blood in the body?", a: ["Lungs", "Liver", "Heart", "Kidney"], c: 2 },
            { q: "Green pigment in plants is called?", a: ["Chlorophyll", "Hemoglobin", "Melanin", "Xanthophyll"], c: 0 },
            { q: "The basic unit of life is?", a: ["Tissue", "Organ", "Cell", "System"], c: 2 },
            { q: "How many bones are in the adult human body?", a: ["200", "206", "210", "250"], c: 1 },
            { q: "Vitamin C deficiency causes?", a: ["Rickets", "Scurvy", "Beriberi", "Night blindness"], c: 1 },
            { q: "Human blood is red due to?", a: ["Plasma", "Platelets", "Hemoglobin", "WBC"], c: 2 },
            { q: "Process by which plants make food?", a: ["Respiration", "Digestion", "Photosynthesis", "Excretion"], c: 2 },
            { q: "The largest organ in the human body is?", a: ["Liver", "Skin", "Lungs", "Brain"], c: 1 },
            { q: "Rabies is caused by?", a: ["Bacteria", "Virus", "Fungi", "Protozoa"], c: 1 },
            { q: "What do bees collect from flowers?", a: ["Water", "Nectar", "Soil", "Leaves"], c: 1 },
            { q: "Example of a mammal that flies?", a: ["Eagle", "Bat", "Butterfly", "Owl"], c: 1 },
            { q: "DNA stands for?", a: ["Deoxyribonucleic Acid", "Dinucleic Acid", "Detergent Acid", "None"], c: 0 },
            { q: "Which gas do humans exhale?", a: ["Oxygen", "Nitrogen", "Carbon dioxide", "Hydrogen"], c: 2 },
            { q: "The study of plants is?", a: ["Zoology", "Botany", "Ecology", "Genetics"], c: 1 },
            { q: "Male reproductive cell in humans?", a: ["Ovum", "Sperm", "Zygote", "Embryo"], c: 1 },
            { q: "Organ used for breathing in fish?", a: ["Lungs", "Skin", "Gills", "Fins"], c: 2 },
            { q: "Fungi reproduce by?", a: ["Seeds", "Spores", "Eggs", "Budding"], c: 1 },
            { q: "Part of the eye that senses light?", a: ["Iris", "Pupil", "Retina", "Lens"], c: 2 },
            { q: "A group of tissues form an?", a: ["Organ", "Cell", "System", "Body"], c: 0 }
        ],
        "Government": [
            { q: "Nigeria became a Republic in what year?", a: ["1960", "1963", "1970", "1999"], c: 1 },
            { q: "Who is the head of the Executive arm in a State?", a: ["President", "Governor", "Speaker", "Chief Judge"], c: 1 },
            { q: "The law-making body in Nigeria is?", a: ["Judiciary", "Executive", "National Assembly", "Police"], c: 2 },
            { q: "How many local governments are in Nigeria?", a: ["360", "774", "500", "100"], c: 1 },
            { q: "Democracy is government of the?", a: ["Kings", "Rich", "People", "Military"], c: 2 },
            { q: "The first capital of Nigeria was?", a: ["Lagos", "Abuja", "Calabar", "Kaduna"], c: 2 },
            { q: "The voting age in Nigeria is?", a: ["16", "18", "21", "25"], c: 1 },
            { q: "ECOWAS headquarters is in?", a: ["Lagos", "Accra", "Abuja", "Lome"], c: 2 },
            { q: "A system with only one political party is?", a: ["Monarchy", "One-party state", "Democracy", "Anarchy"], c: 1 },
            { q: "The highest court in Nigeria is?", a: ["High Court", "Appeal Court", "Supreme Court", "Magistrate"], c: 2 },
            { q: "Who was the first Prime Minister of Nigeria?", a: ["Nnamdi Azikiwe", "Tafawa Balewa", "Obafemi Awolowo", "Ahmadu Bello"], c: 1 },
            { q: "Fundamental human rights are found in the?", a: ["Newspaper", "Constitution", "Bible", "Dictionary"], c: 1 },
            { q: "The symbol of authority in parliament is?", a: ["Gavel", "Mace", "Flag", "Wig"], c: 1 },
            { q: "Citizenship by birth means?", a: ["Buying it", "Born in the country", "Living there for 50 years", "Marriage"], c: 1 },
            { q: "Anarchy means?", a: ["Peace", "Lawlessness", "King's rule", "Military rule"], c: 1 },
            { q: "The Red Cross is an example of an?", a: ["NGO", "Political Party", "Army", "Government"], c: 0 },
            { q: "How many senators represent each state in Nigeria?", a: ["1", "3", "5", "10"], c: 1 },
            { q: "The tenure for a Nigerian President is?", a: ["2 years", "4 years", "6 years", "Life"], c: 1 },
            { q: "The U.N.O was formed in?", a: ["1914", "1945", "1960", "2000"], c: 1 },
            { q: "The arm of government that interprets laws?", a: ["Executive", "Legislative", "Judiciary", "Press"], c: 2 }
        ],
        "General": [
            { q: "Default subject sample question. Answer A.", a: ["Correct A", "Wrong B", "Wrong C", "Wrong D"], c: 0 }
        ]
    };

    let questions = [];
    let currentIdx = 0;
    let userAnswers = {};
    let timerInterval;

    function startExam() {
        const s2 = document.getElementById('sub2').value;
        const s3 = document.getElementById('sub3').value;
        const s4 = document.getElementById('sub4').value;
        if(!s2 || !s3 || !s4) { alert("Please select all subjects."); return; }

        document.getElementById('setup').style.display = 'none';
        document.getElementById('exam-body').style.display = 'block';
        document.getElementById('nav-controls').style.display = 'flex';
        document.getElementById('q-grid').style.display = 'flex';

        buildQuestionSet(['English', s2, s3, s4]);
        renderQuestion();
        renderGrid();
        startTimer(40 * 60);
    }

    function buildQuestionSet(subs) {
        questions = [];
        subs.forEach((s) => {
            const source = bank[s] || bank["General"];
            for(let i=0; i<20; i++) {
                let data = source[i % source.length];
                questions.push({ ...data, subjectName: s });
            }
        });
    }

    function renderQuestion() {
        const q = questions[currentIdx];
        document.getElementById('current-subject-name').innerText = q.subjectName;
        document.getElementById('question-text').innerText = `Q${currentIdx + 1}. ${q.q}`;
        const optContainer = document.getElementById('options');
        optContainer.innerHTML = '';
        q.a.forEach((text, i) => {
            const div = document.createElement('div');
            div.className = 'option' + (userAnswers[currentIdx] === i ? ' selected' : '');
            div.innerHTML = `<strong>${String.fromCharCode(65+i)}.</strong> ${text}`;
            div.onclick = () => { userAnswers[currentIdx] = i; renderQuestion(); renderGrid(); };
            optContainer.appendChild(div);
        });
    }

    function changeQuestion(n) {
        currentIdx += n;
        if(currentIdx < 0) currentIdx = 0;
        if(currentIdx >= questions.length) currentIdx = questions.length - 1;
        renderQuestion();
        renderGrid();
    }

    function renderGrid() {
        const grid = document.getElementById('q-grid');
        grid.innerHTML = '';
        questions.forEach((_, i) => {
            const d = document.createElement('div');
            d.className = 'q-circle' + (i === currentIdx ? ' active' : '') + (userAnswers[i] !== undefined ? ' answered' : '');
            d.innerText = i + 1;
            d.onclick = () => { currentIdx = i; renderQuestion(); renderGrid(); };
            grid.appendChild(d);
        });
    }

    function startTimer(sec) {
        timerInterval = setInterval(() => {
            let m = Math.floor(sec / 60);
            let s = sec % 60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
            if(sec-- <= 0) { clearInterval(timerInterval); submitExam(); }
        }, 1000);
    }

    function submitExam() {
        clearInterval(timerInterval);
        let score = 0;
        questions.forEach((q, i) => { if(userAnswers[i] === q.c) score++; });
        document.getElementById('exam-body').innerHTML = `
            <div style="text-align:center; padding: 40px;">
                <h2 style="color:var(--primary-green)">TRAINING COMPLETED</h2>
                <hr>
                <p style="font-size: 32px;">SCORE: <span style="color:var(--primary-green)">${score} / ${questions.length}</span></p>
                <button class="btn-main" onclick="location.reload()">RESTART TRAINING</button>
            </div>
        `;
        document.getElementById('nav-controls').style.display = 'none';
        document.getElementById('q-grid').style.display = 'none';
    }
</script>
</body>
</html>
